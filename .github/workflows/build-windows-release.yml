name: Build Windows Pre-release

"on":
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install ffmpeg
        run: choco install ffmpeg --no-progress -y

      - name: Copy ffmpeg binaries into assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets\ffmpeg-bin\windows | Out-Null
          $ffmpeg = (Get-Command ffmpeg.exe -ErrorAction SilentlyContinue).Source
          if (-not $ffmpeg) { $ffmpeg = "C:\ProgramData\chocolatey\bin\ffmpeg.exe" }
          $ffprobe = (Get-Command ffprobe.exe -ErrorAction SilentlyContinue).Source
          if (-not $ffprobe) { $ffprobe = "C:\ProgramData\chocolatey\bin\ffprobe.exe" }
          Write-Host "ffmpeg: $ffmpeg"
          Write-Host "ffprobe: $ffprobe"
          Copy-Item $ffmpeg -Destination assets\ffmpeg-bin\windows\ffmpeg.exe
          Copy-Item $ffprobe -Destination assets\ffmpeg-bin\windows\ffprobe.exe

      - name: Generate icon assets
        run: python scripts/generate_icon.py

      - name: Build executable with PyInstaller
        run: python -m PyInstaller --clean pyinstaller.spec

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = (Get-Command makensis.exe -ErrorAction SilentlyContinue).Source
          }
          Write-Host "makensis: $makensis"
          Write-Host "Building version: $version"
          & $makensis "/DVERSION=$version" installer\videoannotation_installer.nsi

      - name: Upload pre-release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: "Visual Stimulus Kit Tool Setup ${{ steps.version.outputs.version }}.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
